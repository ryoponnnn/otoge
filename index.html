<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ColorfulStage!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&family=Zen+Maru+Gothic:wght@700&display=swap');

:root {
  --pink:   #ff4fa3;
  --pink2:  #ff85c8;
  --purple: #9b5cf6;
  --blue:   #38bdf8;
  --yellow: #fbbf24;
  --green:  #34d399;
  --white:  #ffffff;
  --bg1:    #1a0030;
  --bg2:    #0d001a;
  --lane-w: calc(min(100vw, 520px) / 6);
  --hit-y:  84%;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:none; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#0d001a;
  font-family: 'M PLUS Rounded 1c', sans-serif;
}

/* ===================== TITLE ===================== */
#titleScreen {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background: linear-gradient(160deg, #1a0030 0%, #0d001a 50%, #1a0030 100%);
  overflow:hidden;
}

.title-stars {
  position:absolute; inset:0; pointer-events:none;
}
.star {
  position:absolute;
  width:3px; height:3px;
  background:#fff;
  border-radius:50%;
  animation: twinkle var(--dur, 2s) ease-in-out infinite var(--delay, 0s);
}
@keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }

.title-bg-glow {
  position:absolute;
  width:400px; height:400px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(155,92,246,0.3) 0%, transparent 70%);
  top:50%; left:50%; transform:translate(-50%,-60%);
  animation: bgpulse 3s ease-in-out infinite;
}
@keyframes bgpulse { 0%,100%{transform:translate(-50%,-60%) scale(1)} 50%{transform:translate(-50%,-60%) scale(1.15)} }

.title-characters {
  position:relative; z-index:2;
  display:flex; gap:-10px; margin-bottom:24px;
}
.char-silhouette {
  width:70px; height:120px;
  border-radius:50% 50% 0 0 / 60% 60% 0 0;
  position:relative;
}
.char-silhouette::before {
  content:''; position:absolute;
  width:36px; height:36px;
  border-radius:50%;
  background:inherit;
  top:-28px; left:50%; transform:translateX(-50%);
}
.char1 { background:linear-gradient(180deg,#ff85c8,#ff4fa3); box-shadow:0 0 20px rgba(255,79,163,0.6); }
.char2 { background:linear-gradient(180deg,#a78bfa,#7c3aed); box-shadow:0 0 20px rgba(124,58,237,0.6); margin:0 -8px; z-index:1; }
.char3 { background:linear-gradient(180deg,#67e8f9,#0ea5e9); box-shadow:0 0 20px rgba(14,165,233,0.6); }
.char4 { background:linear-gradient(180deg,#fde68a,#f59e0b); box-shadow:0 0 20px rgba(245,158,11,0.6); margin:0 -8px; }

.title-logo {
  font-size: clamp(28px,8vw,52px);
  font-weight:900;
  text-align:center;
  line-height:1.1;
  position:relative; z-index:2;
}
.title-logo span:nth-child(1) { color:#ff85c8; text-shadow:0 0 20px rgba(255,133,200,0.8); }
.title-logo span:nth-child(2) { color:#a78bfa; text-shadow:0 0 20px rgba(167,139,250,0.8); }
.title-logo span:nth-child(3) { color:#67e8f9; text-shadow:0 0 20px rgba(103,232,249,0.8); }
.title-logo span:nth-child(4) { color:#fde68a; text-shadow:0 0 20px rgba(253,230,138,0.8); }
.title-logo span:nth-child(5) { color:#ff85c8; text-shadow:0 0 20px rgba(255,133,200,0.8); }
.title-logo span:nth-child(6) { color:#a78bfa; text-shadow:0 0 20px rgba(167,139,250,0.8); }

.title-sub {
  font-size:clamp(10px,2.5vw,14px);
  color:rgba(255,255,255,0.5);
  letter-spacing:0.3em;
  margin-top:6px;
  position:relative; z-index:2;
}

.diff-select {
  display:flex; gap:10px; margin-top:28px;
  position:relative; z-index:2;
}
.diff-btn {
  padding: 8px 18px;
  border: 2px solid;
  border-radius: 20px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size:clamp(11px,2.5vw,14px);
  font-weight:800;
  cursor:pointer;
  transition: all 0.2s;
  background:transparent;
}
.diff-btn.easy   { color:#34d399; border-color:#34d399; }
.diff-btn.normal { color:#38bdf8; border-color:#38bdf8; }
.diff-btn.hard   { color:#f59e0b; border-color:#f59e0b; }
.diff-btn.expert { color:#f43f5e; border-color:#f43f5e; }
.diff-btn.active, .diff-btn:active {
  background: currentColor;
  color: #1a0030;
  box-shadow: 0 0 16px currentColor;
}

.start-btn {
  margin-top:24px;
  padding:16px 60px;
  border-radius:50px;
  border:none;
  font-family:'M PLUS Rounded 1c',sans-serif;
  font-size:clamp(16px,4vw,22px);
  font-weight:900;
  cursor:pointer;
  background:linear-gradient(135deg,#ff4fa3,#9b5cf6);
  color:#fff;
  box-shadow:0 4px 30px rgba(255,79,163,0.6), 0 0 0 3px rgba(255,255,255,0.15);
  position:relative; z-index:2;
  letter-spacing:0.1em;
  animation: btn-float 2s ease-in-out infinite;
}
@keyframes btn-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.start-btn:active { transform:scale(0.95) !important; }

.legend-row {
  display:flex; gap:14px; margin-top:20px; flex-wrap:wrap; justify-content:center;
  position:relative; z-index:2;
}
.leg { display:flex; align-items:center; gap:5px; font-size:clamp(9px,2vw,11px); color:rgba(255,255,255,0.55); }
.leg-icon { width:12px;height:12px;border-radius:3px;flex-shrink:0; }

/* ===================== GAME ===================== */
#gameScreen {
  position:fixed; inset:0;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:var(--bg2);
}

/* Live BG */
#liveBg {
  position:absolute; inset:0;
  overflow:hidden;
}
.bg-gradient {
  position:absolute; inset:0;
  background: linear-gradient(180deg, #120020 0%, #1a003a 40%, #0d001a 100%);
}
.bg-stage {
  position:absolute; bottom:0; left:0; right:0;
  height:45%;
  background: linear-gradient(180deg, transparent 0%, rgba(155,92,246,0.08) 100%);
  border-top: 1px solid rgba(155,92,246,0.2);
}
.bg-spotlight {
  position:absolute;
  width:300px; height:600px;
  top:-100px; border-radius:50%;
  filter:blur(60px);
  opacity:0.12;
  animation:spotlight 4s ease-in-out infinite;
}
.sp1 { background:#ff4fa3; left:20%; animation-delay:0s; }
.sp2 { background:#9b5cf6; left:50%; transform:translateX(-50%); animation-delay:-2s; }
.sp3 { background:#38bdf8; right:20%; animation-delay:-1s; }
@keyframes spotlight { 0%,100%{opacity:0.1;transform:scaleX(1)} 50%{opacity:0.18;transform:scaleX(1.2)} }
.sp2 { animation:spotlight2 4s ease-in-out infinite -2s; }
@keyframes spotlight2 { 0%,100%{opacity:0.1;transform:translateX(-50%) scaleX(1)} 50%{opacity:0.18;transform:translateX(-50%) scaleX(1.2)} }

/* HUD Top */
#hudTop {
  position:absolute; top:0; left:0; right:0;
  padding: env(safe-area-inset-top, 8px) 12px 0;
  z-index:20;
  background:linear-gradient(180deg,rgba(13,0,26,0.9) 0%,transparent 100%);
  padding-bottom:8px;
}
.hud-inner { display:flex; align-items:center; justify-content:space-between; }
#scoreDisp {
  font-size:clamp(20px,5.5vw,34px);
  font-weight:900;
  color:#fff;
  text-shadow:0 0 20px rgba(255,133,200,0.6);
  min-width:120px;
}
#comboArea { text-align:center; }
#comboNum {
  font-size:clamp(26px,7vw,48px);
  font-weight:900;
  color:#fbbf24;
  line-height:1;
  text-shadow:0 0 15px rgba(251,191,36,0.9);
  display:block;
}
#comboLabel { font-size:clamp(8px,2vw,11px); color:rgba(255,255,255,0.6); letter-spacing:0.25em; }
#accDisp { font-size:clamp(11px,2.8vw,16px); color:rgba(255,255,255,0.7); min-width:80px; text-align:right; }

/* Progress bar */
#progressWrap {
  position:relative; margin:4px 0 0;
  height:6px;
  background:rgba(255,255,255,0.12);
  border-radius:3px;
  overflow:hidden;
}
#progressBar {
  height:100%; width:0%;
  background:linear-gradient(90deg,#ff4fa3,#9b5cf6,#38bdf8);
  border-radius:3px;
  transition:width 0.1s linear;
  box-shadow:0 0 8px rgba(155,92,246,0.8);
}

/* Canvas */
#gameCanvas {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  top:0; bottom:0;
}

/* Judgment */
#judgeDisp {
  position:absolute;
  top:48%;
  left:50%; transform:translateX(-50%);
  font-size:clamp(16px,4.5vw,26px);
  font-weight:900;
  pointer-events:none;
  z-index:30;
  opacity:0;
  white-space:nowrap;
  transition:opacity 0.06s;
}

/* Result overlay */
#resultOverlay {
  position:absolute; inset:0;
  background:rgba(13,0,26,0.93);
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:40;
  backdrop-filter:blur(6px);
}
.res-card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,133,200,0.3);
  border-radius:24px;
  padding:28px 36px;
  text-align:center;
  min-width:260px;
}
.res-title { font-size:clamp(11px,3vw,15px); letter-spacing:0.4em; color:rgba(255,255,255,0.5); margin-bottom:8px; }
.res-grade {
  font-size:clamp(64px,16vw,100px); font-weight:900; line-height:1;
  margin-bottom:12px;
}
.res-score { font-size:clamp(22px,6vw,36px); font-weight:900; color:#fff; margin-bottom:16px; }
.res-stats { font-size:clamp(11px,2.8vw,14px); color:rgba(255,255,255,0.7); line-height:2; margin-bottom:20px; }
.res-btn {
  padding:14px 44px;
  border-radius:50px;
  border:none;
  font-family:'M PLUS Rounded 1c',sans-serif;
  font-size:clamp(13px,3.5vw,18px);
  font-weight:900;
  cursor:pointer;
  background:linear-gradient(135deg,#ff4fa3,#9b5cf6);
  color:#fff;
  box-shadow:0 4px 20px rgba(255,79,163,0.5);
  letter-spacing:0.1em;
  margin:4px;
}
.res-btn2 {
  background:transparent;
  border:2px solid rgba(255,255,255,0.3);
  color:rgba(255,255,255,0.7);
}

/* Fever flash */
#feverFlash {
  position:absolute; inset:0;
  pointer-events:none;
  z-index:25;
  opacity:0;
}
</style>
</head>
<body>

<!-- ═══ TITLE ═══ -->
<div id="titleScreen">
  <div class="title-stars" id="starsContainer"></div>
  <div class="title-bg-glow"></div>

  <div class="title-characters">
    <div class="char-silhouette char1"></div>
    <div class="char-silhouette char4"></div>
    <div class="char-silhouette char2"></div>
    <div class="char-silhouette char3"></div>
  </div>

  <div class="title-logo">
    <span>C</span><span>O</span><span>L</span><span>O</span><span>R</span><span>FUL</span><br>
    <span style="color:#fde68a;text-shadow:0 0 20px rgba(253,230,138,0.8)">STAGE</span><span style="color:#ff85c8;text-shadow:0 0 20px rgba(255,133,200,0.8)">!</span>
  </div>
  <div class="title-sub">✦ RHYTHM LIVE ✦</div>

  <div class="diff-select">
    <button class="diff-btn easy" data-diff="easy">EASY</button>
    <button class="diff-btn normal active" data-diff="normal">NORMAL</button>
    <button class="diff-btn hard" data-diff="hard">HARD</button>
    <button class="diff-btn expert" data-diff="expert">EXPERT</button>
  </div>

  <button class="start-btn" id="startBtn">♪ LIVE START ♪</button>

  <div class="legend-row">
    <div class="leg"><div class="leg-icon" style="background:#ff85c8;border-radius:50%"></div>TAP</div>
    <div class="leg"><div class="leg-icon" style="background:#34d399"></div>HOLD</div>
    <div class="leg"><div class="leg-icon" style="background:#fbbf24;clip-path:polygon(50% 0,100% 100%,0 100%)"></div>FLICK</div>
    <div class="leg"><div class="leg-icon" style="background:linear-gradient(90deg,#38bdf8,#9b5cf6);border-radius:2px"></div>SLIDE</div>
    <div class="leg"><div class="leg-icon" style="background:linear-gradient(135deg,#ff4fa3,#f59e0b);border-radius:50%"></div>SIM</div>
  </div>
</div>

<!-- ═══ GAME ═══ -->
<div id="gameScreen">
  <div id="liveBg">
    <div class="bg-gradient"></div>
    <div class="bg-stage"></div>
    <div class="bg-spotlight sp1"></div>
    <div class="bg-spotlight sp2"></div>
    <div class="bg-spotlight sp3"></div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="hudTop">
    <div class="hud-inner">
      <div id="scoreDisp">0</div>
      <div id="comboArea">
        <span id="comboNum">0</span>
        <div id="comboLabel">COMBO</div>
      </div>
      <div id="accDisp">100.00%</div>
    </div>
    <div id="progressWrap"><div id="progressBar"></div></div>
  </div>

  <div id="judgeDisp"></div>
  <div id="feverFlash"></div>

  <div id="resultOverlay">
    <div class="res-card">
      <div class="res-title">✦ RESULT ✦</div>
      <div class="res-grade" id="resGrade">S</div>
      <div class="res-score" id="resScore">0</div>
      <div class="res-stats" id="resStats"></div>
      <button class="res-btn" id="retryBtn">↺ もう一度</button>
      <button class="res-btn res-btn2" id="titleBtn">タイトルへ</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  COLORFUL STAGE! — Proseka-style Rhythm Engine
// ══════════════════════════════════════════════
const $=id=>document.getElementById(id);
const canvas=$('gameCanvas'), ctx=canvas.getContext('2d');

// ── CONSTANTS ──────────────────────────────────
const LANES = 6;
const HIT_Y_RATIO = 0.84;
const SPEED_BASE = 0.50;        // ratio of screen height per second
const NOTE_R = 20;              // tap note radius
const HOLD_W = 32;
const WINDOWS = { perfect:55, great:100, good:150, miss:180 };
const SONG_DURATION = 18000;    // ms

// Lane colors (proseka style — each lane has a color)
const LANE_COLORS = ['#ff85c8','#c084fc','#818cf8','#38bdf8','#34d399','#fbbf24'];
const NOTE_ALPHA_COLORS = [
  {fill:'#ff85c8',glow:'rgba(255,133,200,0.8)',dark:'rgba(255,79,163,0.9)'},
  {fill:'#c084fc',glow:'rgba(192,132,252,0.8)',dark:'rgba(139,92,246,0.9)'},
  {fill:'#818cf8',glow:'rgba(129,140,248,0.8)',dark:'rgba(99,102,241,0.9)'},
  {fill:'#38bdf8',glow:'rgba(56,189,248,0.8)',dark:'rgba(14,165,233,0.9)'},
  {fill:'#34d399',glow:'rgba(52,211,153,0.8)',dark:'rgba(16,185,129,0.9)'},
  {fill:'#fbbf24',glow:'rgba(251,191,36,0.8)',dark:'rgba(245,158,11,0.9)'},
];

// ── DIFFICULTIES ───────────────────────────────
const DIFFICULTIES = {
  easy: { speed:0.38, label:'EASY', color:'#34d399' },
  normal: { speed:0.50, label:'NORMAL', color:'#38bdf8' },
  hard: { speed:0.65, label:'HARD', color:'#f59e0b' },
  expert: { speed:0.82, label:'EXPERT', color:'#f43f5e' },
};
let currentDiff = 'normal';

// ── CHART BUILDER ──────────────────────────────
// type: tap / hold / flick / slide_start / slide_mid / slide_end / sim_tap / sim_flick
function buildChart(diff) {
  const N=(t,l,ty,dur=0)=>({time:t,lane:l,type:ty,dur,id:Math.random()});
  const notes=[];
  const gap = diff==='easy'?600:diff==='normal'?400:diff==='hard'?280:200;
  const g=gap;

  // ── Intro (gentle taps) ──
  notes.push(N(800,2,'tap'), N(800+g,3,'tap'));
  notes.push(N(800+g*2,1,'tap'), N(800+g*3,4,'tap'));
  notes.push(N(800+g*4,0,'tap'), N(800+g*5,5,'tap'));

  // ── Hold intro ──
  notes.push(N(800+g*6,2,'hold',g*3));
  notes.push(N(800+g*7,3,'hold',g*3));
  notes.push(N(800+g*8,0,'tap'), N(800+g*9,5,'tap'));

  // ── Slide sequence (3-note slide across lanes) ──
  const s1=800+g*11;
  notes.push(N(s1,0,'slide_start',0));
  notes.push(N(s1+g*0.5,1,'slide_mid',0));
  notes.push(N(s1+g,2,'slide_mid',0));
  notes.push(N(s1+g*1.5,3,'slide_mid',0));
  notes.push(N(s1+g*2,4,'slide_end',0));

  // ── Flick burst ──
  const f1=s1+g*3.5;
  notes.push(N(f1,1,'flick'), N(f1+g,4,'flick'));
  notes.push(N(f1+g*2,2,'flick'), N(f1+g*3,3,'flick'));
  notes.push(N(f1+g*4,0,'flick'), N(f1+g*5,5,'flick'));

  // ── Simultaneous section ──
  const sim1=f1+g*7;
  notes.push(N(sim1,0,'sim_tap'), N(sim1,5,'sim_tap'));
  notes.push(N(sim1+g,1,'sim_tap'), N(sim1+g,4,'sim_tap'));
  notes.push(N(sim1+g*2,2,'sim_tap'), N(sim1+g*2,3,'sim_tap'));
  notes.push(N(sim1+g*3,0,'sim_tap'), N(sim1+g*3,2,'sim_tap'), N(sim1+g*3,4,'sim_tap'));

  // ── Dense holds ──
  const h2=sim1+g*5;
  notes.push(N(h2,0,'hold',g*5), N(h2,5,'hold',g*5));
  notes.push(N(h2+g,2,'hold',g*3));
  for(let i=0;i<4;i++) notes.push(N(h2+g*(1.5+i),1+i,'tap'));

  // ── Reverse slide ──
  const s2=h2+g*7;
  notes.push(N(s2,5,'slide_start',0));
  notes.push(N(s2+g*0.5,4,'slide_mid',0));
  notes.push(N(s2+g,3,'slide_mid',0));
  notes.push(N(s2+g*1.5,2,'slide_mid',0));
  notes.push(N(s2+g*2,1,'slide_end',0));

  // ── Mixed section ──
  const m1=s2+g*3.5;
  notes.push(N(m1,0,'tap'), N(m1,3,'flick'));
  notes.push(N(m1+g,1,'hold',g*2), N(m1+g,4,'hold',g*2));
  notes.push(N(m1+g*1.5,2,'flick'));
  notes.push(N(m1+g*2.5,3,'tap'), N(m1+g*2.5,0,'tap'));

  // ── Fever build ──
  const fv=m1+g*4.5;
  for(let i=0;i<(diff==='expert'?12:diff==='hard'?8:6);i++){
    const t=fv+i*(g*0.7);
    notes.push(N(t, i%LANES, i%3===0?'flick':i%3===1?'tap':'slide_start'));
    if(i%2===0 && diff!=='easy') notes.push(N(t,(i+3)%LANES,'tap'));
  }

  // ── Climax - all sim ──
  const cl=fv+g*10;
  notes.push(N(cl,0,'sim_tap'),N(cl,1,'sim_tap'),N(cl,2,'sim_tap'),N(cl,3,'sim_tap'),N(cl,4,'sim_tap'),N(cl,5,'sim_tap'));
  notes.push(N(cl+g,0,'sim_flick'),N(cl+g,5,'sim_flick'));
  notes.push(N(cl+g*2,1,'hold',g*4),N(cl+g*2,4,'hold',g*4));
  notes.push(N(cl+g*2.5,2,'sim_tap'),N(cl+g*2.5,3,'sim_tap'));

  // ── Outro ──
  const out=cl+g*7;
  notes.push(N(out,2,'tap'),N(out+g,3,'tap'),N(out+g*2,1,'tap'),N(out+g*3,4,'tap'));
  notes.push(N(out+g*4,0,'sim_tap'),N(out+g*4,5,'sim_tap'));
  notes.push(N(out+g*5,2,'hold',g*3),N(out+g*5,3,'hold',g*3));
  notes.push(N(out+g*6,1,'flick'),N(out+g*6,4,'flick'));
  notes.push(N(out+g*7,0,'tap'),N(out+g*7,2,'tap'),N(out+g*7,4,'tap'));
  notes.push(N(out+g*8,1,'tap'),N(out+g*8,3,'tap'),N(out+g*8,5,'tap'));
  notes.push(N(out+g*9,2,'sim_flick'),N(out+g*9,3,'sim_flick'));

  // Final note
  notes.push(N(out+g*11,0,'sim_tap'),N(out+g*11,1,'sim_tap'),N(out+g*11,2,'sim_tap'),
             N(out+g*11,3,'sim_tap'),N(out+g*11,4,'sim_tap'),N(out+g*11,5,'sim_tap'));

  return notes.sort((a,b)=>a.time-b.time);
}

// ── LAYOUT ─────────────────────────────────────
let W,H,hitY,laneW,laneXs,noteSpeed,canvasLeft;
function resize(){
  const maxW = Math.min(window.innerWidth, 520);
  W = maxW;
  H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  hitY = H * HIT_Y_RATIO;
  laneW = W / LANES;
  laneXs = Array.from({length:LANES},(_,i)=>laneW*i+laneW/2);
  const dconf = DIFFICULTIES[currentDiff];
  noteSpeed = dconf.speed * H / 1000;  // px per ms
  // Center canvas
  canvasLeft = (window.innerWidth - W)/2;
  canvas.style.left = canvasLeft+'px';
}
window.addEventListener('resize',resize);

// ── STATE ──────────────────────────────────────
let G={};
function resetGame(){
  resize();
  const dconf=DIFFICULTIES[currentDiff];
  noteSpeed=dconf.speed*H/1000;
  G={
    running:false, ended:false,
    startTime:0, elapsed:0,
    chart:buildChart(currentDiff),
    notes:[], effects:[],
    score:0, combo:0, maxCombo:0,
    judged:{PERFECT:0,GREAT:0,GOOD:0,MISS:0},
    totalNotes:0,
    activeHolds:{},    // lane->noteObj
    touchLanes:{},     // touchId->lane
    flickTracks:{},    // touchId->{startY,lane}
    prevTouchY:{},     // touchId->clientY
    fever:false, feverMult:1,
  };
  G.totalNotes=G.chart.length;
}

// ── DRAW ───────────────────────────────────────
function glw(color,blur=18){ctx.shadowColor=color;ctx.shadowBlur=blur;}
function noglw(){ctx.shadowBlur=0;}

// Background
function drawBg(){
  ctx.fillStyle='#0d001a';
  ctx.fillRect(0,0,W,H);
  // Perspective grid lines
  const vp={x:W/2,y:hitY*0.4};
  ctx.strokeStyle='rgba(155,92,246,0.07)';
  ctx.lineWidth=1;
  for(let i=0;i<=LANES;i++){
    ctx.beginPath();
    ctx.moveTo(vp.x+(laneXs[0]-laneW/2+(laneW*i)-W/2)*0.3,vp.y);
    ctx.lineTo(laneW*i,H+50);
    ctx.stroke();
  }
  // Horizontal depth lines
  for(let d=0;d<8;d++){
    const yy=hitY-d*(hitY/8);
    const alpha=0.03+d*0.01;
    ctx.strokeStyle=`rgba(155,92,246,${alpha})`;
    ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(W,yy); ctx.stroke();
  }
}

// Lane separators & buttons
function drawLanes(){
  // Lane dividers
  for(let i=1;i<LANES;i++){
    ctx.strokeStyle='rgba(255,255,255,0.07)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(laneW*i,0); ctx.lineTo(laneW*i,H); ctx.stroke();
  }

  // Hit judgment line — glowing
  const grad=ctx.createLinearGradient(0,0,W,0);
  LANE_COLORS.forEach((c,i)=>grad.addColorStop(i/LANES,c));
  glw('rgba(255,255,255,0.3)',8);
  ctx.strokeStyle=grad; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(0,hitY); ctx.lineTo(W,hitY); ctx.stroke();
  noglw();

  // Lane tap buttons
  for(let i=0;i<LANES;i++){
    const x=laneXs[i];
    const col=NOTE_ALPHA_COLORS[i];
    const active=Object.values(G.touchLanes).includes(i)||G.activeHolds[i];
    // Button circle
    ctx.beginPath(); ctx.arc(x,hitY,NOTE_R+6,0,Math.PI*2);
    if(active){
      glw(col.glow,25);
      ctx.fillStyle=col.glow; ctx.fill();
    }
    ctx.strokeStyle=active?col.fill:'rgba(255,255,255,0.2)';
    ctx.lineWidth=2; ctx.stroke();
    noglw();

    // Small lane color dot at bottom
    ctx.beginPath(); ctx.arc(x,hitY,5,0,Math.PI*2);
    ctx.fillStyle=active?col.fill:'rgba(255,255,255,0.3)'; ctx.fill();
  }
}

// Hold body
function drawHoldBody(note){
  const x=laneXs[note.lane];
  const col=NOTE_ALPHA_COLORS[note.lane];
  const startY=note.hit?hitY:note.y;
  const travelPx=note.dur*noteSpeed;
  const endY=Math.min(note.y+travelPx, H+60);

  // Body gradient
  const gr=ctx.createLinearGradient(x,startY,x,endY);
  gr.addColorStop(0,col.fill);
  gr.addColorStop(1,'rgba(255,255,255,0.05)');

  // Rounded strip
  ctx.save();
  glw(col.glow,15);
  ctx.strokeStyle=gr; ctx.lineWidth=HOLD_W; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x,startY+2); ctx.lineTo(x,endY); ctx.stroke();

  // Bright center line
  ctx.strokeStyle=`rgba(255,255,255,0.5)`; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(x,startY+2); ctx.lineTo(x,endY); ctx.stroke();
  noglw();
  ctx.restore();

  // Active hold progress indicator
  if(note.hit && note.dur>0){
    const prog=note.holdElapsed/note.dur;
    const remainY=hitY-(1-prog)*travelPx;
    ctx.save();
    ctx.globalAlpha=0.3;
    ctx.fillStyle=col.fill;
    ctx.fillRect(x-HOLD_W/2,hitY,HOLD_W,remainY-hitY);
    ctx.restore();
  }
}

// Slide connector
function drawSlideConnector(noteA, noteB){
  const xa=laneXs[noteA.lane], ya=noteA.y;
  const xb=laneXs[noteB.lane], yb=noteB.y;
  const col=NOTE_ALPHA_COLORS[noteA.lane];
  ctx.save();
  glw(col.glow,12);
  ctx.strokeStyle=col.fill; ctx.lineWidth=8; ctx.lineCap='round';
  ctx.globalAlpha=0.6;
  ctx.beginPath();
  ctx.moveTo(xa,ya);
  ctx.bezierCurveTo(xa,(ya+yb)/2,xb,(ya+yb)/2,xb,yb);
  ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(xa,ya);
  ctx.bezierCurveTo(xa,(ya+yb)/2,xb,(ya+yb)/2,xb,yb);
  ctx.stroke();
  noglw(); ctx.restore();
}

// Main note drawing
function drawNote(note){
  if((note.hit && note.type!=='hold')||note.missed) return;
  const x=laneXs[note.lane], y=note.y;
  const col=NOTE_ALPHA_COLORS[note.lane];

  if(note.type==='hold') drawHoldBody(note);

  const isFlick=note.type==='flick'||note.type==='sim_flick';
  const isSim=note.type==='sim_tap'||note.type==='sim_flick';
  const isSlideEnd=note.type==='slide_end';
  const isSlideStart=note.type==='slide_start';
  const isSlideAny=note.type.startsWith('slide');

  ctx.save();
  // Outer glow ring
  glw(col.glow,30);
  ctx.beginPath(); ctx.arc(x,y,NOTE_R+4,0,Math.PI*2);
  ctx.strokeStyle=col.fill; ctx.lineWidth=2; ctx.globalAlpha=0.4; ctx.stroke();
  noglw(); ctx.globalAlpha=1;

  // Shadow/body
  if(isFlick){
    // Triangle/arrow note
    const r=NOTE_R;
    glw(col.glow,25);
    ctx.fillStyle=col.dark;
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    // Arrow overlay
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.moveTo(x,y-r*0.55);
    ctx.lineTo(x+r*0.45,y+r*0.35);
    ctx.lineTo(x-r*0.45,y+r*0.35);
    ctx.closePath(); ctx.fill();
    noglw();
    // Sparkles
    for(let k=0;k<4;k++){
      const a=(k/4)*Math.PI*2;
      const sx=x+Math.cos(a)*(r+8), sy=y+Math.sin(a)*(r+8);
      ctx.fillStyle=col.fill;
      ctx.beginPath(); ctx.arc(sx,sy,2.5,0,Math.PI*2); ctx.fill();
    }
  } else if(isSlideAny){
    // Diamond-ish note
    glw(col.glow,20);
    ctx.fillStyle=col.dark;
    ctx.beginPath();
    ctx.arc(x,y,NOTE_R,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=2.5; ctx.stroke();
    noglw();
    // Chevron indicator
    ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath();
    if(isSlideStart){
      ctx.moveTo(x-7,y+4); ctx.lineTo(x,y-4); ctx.lineTo(x+7,y+4);
    } else if(isSlideEnd){
      ctx.moveTo(x-7,y-4); ctx.lineTo(x,y+4); ctx.lineTo(x+7,y-4);
    } else {
      ctx.moveTo(x-8,y-3); ctx.lineTo(x,y+3); ctx.lineTo(x+8,y-3);
    }
    ctx.stroke();
  } else if(isSim){
    // Sim note: concentric rings + star
    glw(col.glow,30);
    ctx.fillStyle=col.dark;
    ctx.beginPath(); ctx.arc(x,y,NOTE_R,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=col.fill; ctx.lineWidth=3; ctx.stroke();
    noglw();
    // Inner star
    ctx.fillStyle='#fff';
    ctx.beginPath();
    for(let k=0;k<5;k++){
      const ao=(k/5)*Math.PI*2-Math.PI/2;
      const ao2=ao+Math.PI/5;
      const ox=x+Math.cos(ao)*NOTE_R*0.55, oy=y+Math.sin(ao)*NOTE_R*0.55;
      const ix=x+Math.cos(ao2)*NOTE_R*0.25, iy=y+Math.sin(ao2)*NOTE_R*0.25;
      k===0?ctx.moveTo(ox,oy):ctx.lineTo(ox,oy);
      ctx.lineTo(ix,iy);
    }
    ctx.closePath(); ctx.fill();
    // Outer glow rings
    glw(col.glow,10);
    ctx.strokeStyle=col.fill; ctx.lineWidth=1.5; ctx.globalAlpha=0.5;
    ctx.beginPath(); ctx.arc(x,y,NOTE_R+8,0,Math.PI*2); ctx.stroke();
    noglw(); ctx.globalAlpha=1;
  } else {
    // Standard tap note — circle with gradient
    glw(col.glow,25);
    const rg=ctx.createRadialGradient(x-NOTE_R*0.3,y-NOTE_R*0.3,2,x,y,NOTE_R);
    rg.addColorStop(0,'#fff');
    rg.addColorStop(0.4,col.fill);
    rg.addColorStop(1,col.dark);
    ctx.fillStyle=rg;
    ctx.beginPath(); ctx.arc(x,y,NOTE_R,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2; ctx.stroke();
    noglw();
  }
  ctx.restore();
}

// Effects
function spawnHitFX(x,y,col,jd){
  const n=jd==='PERFECT'?16:jd==='GREAT'?10:6;
  // Burst ring
  G.effects.push({t:'ring',x,y,col,r:NOTE_R,maxR:NOTE_R*3.5,life:1,dec:0.05});
  // Particles
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const spd=1.5+Math.random()*4;
    G.effects.push({t:'p',x,y,col,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1,r:2+Math.random()*3,life:1,dec:0.025+Math.random()*0.02});
  }
  if(jd==='PERFECT'){
    // Extra sparkle stars
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2;
      G.effects.push({t:'star',x:x+Math.cos(a)*(NOTE_R+10),y:y+Math.sin(a)*(NOTE_R+10),col,life:1,dec:0.04,size:4});
    }
  }
}

function drawEffects(dt){
  G.effects=G.effects.filter(e=>e.life>0);
  for(const e of G.effects){
    e.life-=e.dec*(dt/16);
    ctx.save(); ctx.globalAlpha=Math.max(0,e.life);
    if(e.t==='ring'){
      e.r+=(e.maxR-e.r)*0.2;
      glw(e.col,12);
      ctx.strokeStyle=e.col; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.stroke();
      noglw();
    } else if(e.t==='p'){
      e.x+=e.vx; e.y+=e.vy; e.vy+=0.12;
      ctx.fillStyle=e.col;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
    } else if(e.t==='star'){
      glw(e.col,10);
      ctx.fillStyle='#fff';
      ctx.beginPath();
      ctx.arc(e.x,e.y,e.size*e.life,0,Math.PI*2); ctx.fill();
      noglw();
    }
    ctx.restore();
  }
}

// ── AUDIO — Simple beep via Web Audio ──────────
let audioCtx;
function initAudio(){ try{ audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function playBeep(freq=880,dur=0.05,type='sine',vol=0.15){
  if(!audioCtx) return;
  try{
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type=type; o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.start(); o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function playHitSound(jd){
  if(jd==='PERFECT') playBeep(1047,0.06,'sine',0.18);
  else if(jd==='GREAT') playBeep(880,0.05,'sine',0.13);
  else if(jd==='GOOD') playBeep(698,0.05,'triangle',0.1);
}

// ── JUDGMENT ───────────────────────────────────
const JCOLORS={PERFECT:'#fbbf24',GREAT:'#38bdf8',GOOD:'#34d399',MISS:'#f43f5e'};
function doJudge(note,jd,x,y){
  if(jd!=='MISS'){
    const mul={PERFECT:300,GREAT:200,GOOD:100}[jd];
    G.score+=mul*(1+G.combo*0.0008);
    G.combo++;
    G.maxCombo=Math.max(G.maxCombo,G.combo);
    G.judged[jd]++;
    const col=NOTE_ALPHA_COLORS[note.lane];
    spawnHitFX(x,y,col.fill,jd);
    playHitSound(jd);
  } else {
    G.combo=0; G.judged.MISS++;
  }
  showJudge(jd,x);
  updateHUD();
  // Fever
  if(G.combo>0&&G.combo%20===0){ triggerFever(); }
}

function showJudge(jd,x){
  const el=$('judgeDisp');
  const icons={PERFECT:'✦ PERFECT ✦',GREAT:'GREAT',GOOD:'GOOD',MISS:'MISS'};
  el.textContent=icons[jd];
  el.style.color=JCOLORS[jd];
  el.style.textShadow=`0 0 20px ${JCOLORS[jd]}, 0 0 40px ${JCOLORS[jd]}`;
  el.style.opacity='1';
  el.style.fontSize=jd==='PERFECT'?'clamp(18px,5vw,28px)':'clamp(14px,3.8vw,22px)';
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.opacity='0',jd==='PERFECT'?600:400);
}

function triggerFever(){
  const ff=$('feverFlash');
  ff.style.background='radial-gradient(circle,rgba(255,133,200,0.2) 0%,transparent 70%)';
  ff.style.opacity='1';
  setTimeout(()=>ff.style.opacity='0',300);
}

function updateHUD(){
  $('scoreDisp').textContent=Math.floor(G.score).toLocaleString();
  const cn=$('comboNum');
  cn.textContent=G.combo;
  if(G.combo>0){ cn.style.transform='scale(1.25)'; setTimeout(()=>cn.style.transform='scale(1)',80); }
  const tot=Object.values(G.judged).reduce((a,b)=>a+b,0);
  if(tot>0){
    const w=G.judged.PERFECT*100+G.judged.GREAT*70+G.judged.GOOD*40;
    const acc=w/(tot*100)*100;
    $('accDisp').textContent=acc.toFixed(2)+'%';
  }
}

// ── INPUT ──────────────────────────────────────
function getLane(clientX){
  const x=clientX-canvasLeft;
  return Math.max(0,Math.min(LANES-1,Math.floor(x/laneW)));
}

function tryHit(lane, touchId){
  if(lane<0||lane>=LANES) return;
  const now=G.elapsed;
  let best=null, bestD=Infinity;
  for(const n of G.notes){
    if(n.lane!==lane||n.hit||n.missed) continue;
    const d=Math.abs(n.time-now);
    if(d<bestD&&d<=WINDOWS.miss){ bestD=d; best=n; }
  }
  if(!best) return;
  const jd=bestD<=WINDOWS.perfect?'PERFECT':bestD<=WINDOWS.great?'GREAT':bestD<=WINDOWS.good?'GOOD':null;
  if(!jd) return;
  const x=laneXs[lane];
  best.hit=true;
  if(best.type==='hold'){
    best.holdElapsed=0;
    G.activeHolds[lane]=best;
    G.touchLanes[touchId]=lane;
  }
  doJudge(best,jd,x,hitY);
}

function releaseHold(lane, touchId){
  const h=G.activeHolds[lane];
  if(h){
    if(h.holdElapsed/h.dur>0.7){ doJudge(h,'GREAT',laneXs[lane],hitY); }
    else { doJudge(h,'MISS',laneXs[lane],hitY); }
    h.missed=true;
    delete G.activeHolds[lane];
  }
  if(touchId) delete G.touchLanes[touchId];
}

// Touch
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const lane=getLane(t.clientX);
    G.touchLanes[t.identifier]=lane;
    G.flickTracks[t.identifier]={startY:t.clientY,lane};
    G.prevTouchY[t.identifier]=t.clientY;
    tryHit(lane,t.identifier);
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const lane=getLane(t.clientX);
    const prev=G.touchLanes[t.identifier];
    if(prev!==undefined&&prev!==lane){
      G.touchLanes[t.identifier]=lane;
      tryHit(lane,t.identifier);
    }
    G.prevTouchY[t.identifier]=t.clientY;
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const lane=G.touchLanes[t.identifier];
    if(lane!==undefined&&G.activeHolds[lane]){
      releaseHold(lane,t.identifier);
    } else { delete G.touchLanes[t.identifier]; }
    delete G.flickTracks[t.identifier];
    delete G.prevTouchY[t.identifier];
  }
},{passive:false});

// Mouse
let mDown=false;
canvas.addEventListener('mousedown',e=>{
  mDown=true; initAudio();
  const lane=getLane(e.clientX);
  G.touchLanes['m']=lane; tryHit(lane,'m');
});
canvas.addEventListener('mousemove',e=>{
  if(!mDown) return;
  const lane=getLane(e.clientX);
  if(G.touchLanes['m']!==lane){ G.touchLanes['m']=lane; tryHit(lane,'m'); }
});
canvas.addEventListener('mouseup',e=>{
  mDown=false;
  const lane=G.touchLanes['m'];
  if(lane!==undefined&&G.activeHolds[lane]) releaseHold(lane,'m');
  else delete G.touchLanes['m'];
});

// Keyboard: A S D F J K = lanes 0-5
document.addEventListener('keydown',e=>{
  if(!G.running) return;
  const map={KeyA:0,KeyS:1,KeyD:2,KeyF:3,KeyJ:4,KeyK:5};
  const lane=map[e.code];
  if(lane===undefined||G.touchLanes['kb'+e.code]!==undefined) return;
  G.touchLanes['kb'+e.code]=lane; tryHit(lane,'kb'+e.code);
});
document.addEventListener('keyup',e=>{
  const map={KeyA:0,KeyS:1,KeyD:2,KeyF:3,KeyJ:4,KeyK:5};
  const lane=map[e.code];
  if(lane===undefined) return;
  if(G.activeHolds[lane]) releaseHold(lane,'kb'+e.code);
  else delete G.touchLanes['kb'+e.code];
});

// ── GAME LOOP ──────────────────────────────────
let rafId, lastTs=0;
function loop(ts){
  if(!G.running) return;
  const dt=Math.min(ts-lastTs,50); lastTs=ts;
  G.elapsed=ts-G.startTime;

  const spawnAhead=2200;
  while(G.chart.length&&G.chart[0].time<=G.elapsed+spawnAhead){
    const def=G.chart.shift();
    G.notes.push({...def,y:-NOTE_R-10,hit:false,missed:false,holdElapsed:0});
  }

  // Update y positions
  for(const n of G.notes){
    if(n.missed||(n.hit&&n.type!=='hold')) continue;
    if(n.hit&&n.type==='hold'){
      n.holdElapsed+=dt;
      if(n.holdElapsed>=n.dur){
        doJudge(n,'PERFECT',laneXs[n.lane],hitY);
        n.missed=true;
        delete G.activeHolds[n.lane];
      }
      continue;
    }
    n.y = hitY - (n.time-G.elapsed)*noteSpeed;
    // Miss check
    if(!n.hit&&!n.missed&&G.elapsed>n.time+WINDOWS.miss){
      n.missed=true;
      doJudge(n,'MISS',laneXs[n.lane],hitY);
    }
  }
  G.notes=G.notes.filter(n=>!n.missed&&!(n.hit&&n.type!=='hold'));

  // End check
  if(!G.ended&&G.chart.length===0&&G.notes.length===0&&G.elapsed>500){ endGame(); return; }

  // DRAW
  drawBg();
  drawLanes();

  // Slide connectors
  const slideNotes=G.notes.filter(n=>n.type.startsWith('slide')&&!n.hit&&!n.missed).sort((a,b)=>a.y-b.y);
  for(let i=0;i<slideNotes.length-1;i++){
    const a=slideNotes[i],b=slideNotes[i+1];
    if(Math.abs(a.time-b.time)<1200) drawSlideConnector(a,b);
  }

  // Notes (holds under taps)
  const sorted=[...G.notes].sort((a,b)=>(a.type==='hold'?-1:1)-(b.type==='hold'?-1:1));
  for(const n of sorted) drawNote(n);

  drawEffects(dt);

  // Sim line connector
  const simNotes=G.notes.filter(n=>(n.type==='sim_tap'||n.type==='sim_flick')&&!n.hit&&!n.missed);
  const simGroups={};
  for(const n of simNotes){
    const k=Math.round(n.time/10)*10;
    if(!simGroups[k]) simGroups[k]=[];
    simGroups[k].push(n);
  }
  for(const grp of Object.values(simGroups)){
    if(grp.length<2) continue;
    grp.sort((a,b)=>a.lane-b.lane);
    const col=NOTE_ALPHA_COLORS[grp[0].lane];
    ctx.save(); ctx.globalAlpha=0.5;
    glw(col.glow,8);
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
    ctx.beginPath();
    for(let i=0;i<grp.length;i++){
      const gn=grp[i];
      i===0?ctx.moveTo(laneXs[gn.lane],gn.y):ctx.lineTo(laneXs[gn.lane],gn.y);
    }
    ctx.stroke(); ctx.setLineDash([]); noglw(); ctx.restore();
  }

  // Progress
  $('progressBar').style.width=Math.min(100,G.elapsed/SONG_DURATION*100)+'%';

  rafId=requestAnimationFrame(loop);
}

// ── END GAME ───────────────────────────────────
function endGame(){
  G.running=false; G.ended=true;
  cancelAnimationFrame(rafId);

  const tot=G.totalNotes;
  const p=G.judged.PERFECT||0, gr=G.judged.GREAT||0, go=G.judged.GOOD||0, ms=G.judged.MISS||0;
  const acc=(p*100+gr*70+go*40)/(tot*100)*100||0;
  const grade=acc>=99?'AP':acc>=97?'S+':acc>=93?'S':acc>=85?'A':acc>=75?'B':acc>=60?'C':'D';
  const gColors={'AP':'linear-gradient(135deg,#fbbf24,#f59e0b)','S+':'linear-gradient(135deg,#c084fc,#9b5cf6)','S':'linear-gradient(135deg,#ff85c8,#ff4fa3)','A':'linear-gradient(135deg,#38bdf8,#0ea5e9)','B':'linear-gradient(135deg,#34d399,#10b981)','C':'#94a3b8','D':'#64748b'};

  $('resGrade').textContent=grade;
  $('resGrade').style.background=gColors[grade]||'#fff';
  $('resGrade').style.webkitBackgroundClip='text';
  $('resGrade').style.webkitTextFillColor='transparent';
  $('resScore').textContent=Math.floor(G.score).toLocaleString()+'pt';
  $('resStats').innerHTML=
    `MAX COMBO　: ${G.maxCombo}<br>`+
    `PERFECT　　: ${p}<br>`+
    `GREAT　　　: ${gr}<br>`+
    `GOOD　　　 : ${go}<br>`+
    `MISS　　　 : ${ms}<br>`+
    `ACCURACY　 : ${acc.toFixed(2)}%`;
  $('resultOverlay').style.display='flex';
}

// ── INIT ───────────────────────────────────────
function startGame(){
  initAudio();
  $('titleScreen').style.display='none';
  $('gameScreen').style.display='flex';
  $('resultOverlay').style.display='none';
  resetGame();
  G.running=true;
  lastTs=performance.now();
  G.startTime=lastTs;
  updateHUD();
  rafId=requestAnimationFrame(loop);
}

function goTitle(){
  G.running=false; cancelAnimationFrame(rafId);
  $('gameScreen').style.display='none';
  $('titleScreen').style.display='flex';
}

// Difficulty select
document.querySelectorAll('.diff-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentDiff=btn.dataset.diff;
  });
});

$('startBtn').addEventListener('click',startGame);
$('startBtn').addEventListener('touchend',e=>{e.preventDefault();startGame();});
$('retryBtn').addEventListener('click',startGame);
$('retryBtn').addEventListener('touchend',e=>{e.preventDefault();startGame();});
$('titleBtn').addEventListener('click',goTitle);
$('titleBtn').addEventListener('touchend',e=>{e.preventDefault();goTitle();});

// Stars
(function generateStars(){
  const c=$('starsContainer');
  for(let i=0;i<80;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;
      --dur:${1.5+Math.random()*3}s;--delay:${-Math.random()*3}s;
      width:${1+Math.random()*3}px;height:${1+Math.random()*3}px;opacity:${Math.random()}`;
    c.appendChild(s);
  }
})();

resize();
</script>
